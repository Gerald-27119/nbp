name: nbp
#https://hub.docker.com/_/postgres
services:
  postgres-db:
    image: postgres:18.3-alpine3.22
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=dev_postgres_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data: